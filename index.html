<!DOCTYPE html>
<html>
<head>
	<base target="_top">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="manifest" href="manifest.json">
	<meta name="theme-color" content="#1976d2">
	<style>
		:root { --primary: #2c3e50; --secondary: #27ae60; --bg: #f4f7f6; --danger: #ff7675; }
		body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); padding: 20px; }
		.container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
		h2 { color: var(--primary); border-bottom: 2px solid var(--primary); }
		.header-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; background: #ecf0f1; padding: 15px; border-radius: 5px; }
		table { width: 100%; border-collapse: collapse; margin-top: 10px; }
		th { background: var(--primary); color: white; padding: 12px; text-align: left; }
		td { padding: 8px; border-bottom: 1px solid #eee; }
		input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
		.alerta-critica { background-color: var(--danger) !important; color: white; font-weight: bold; }
		.btn-save { background: var(--secondary); color: white; padding: 15px; border: none; border-radius: 5px; width: 100%; margin-top: 20px; cursor: pointer; font-weight: bold; }
		.section-title { background: #dfe6e9; padding: 8px; font-weight: bold; color: #636e72; font-size: 12px; }
	</style>
</head>
<body>
	<div class="container">
		<h2>Control de Calidad: Temperaturas y Humedad</h2>
		<form id="formRegistro">
			<div class="header-fields">
				<div><label>Responsable:</label><input type="text" name="responsable" id="responsable" required></div>
				<div><label>Fecha:</label><input type="date" name="fechaMain" id="fechaMain" required></div>
			</div>

			<table>
				<thead>
					<tr>
						<th>Área / Equipo</th>
						<th style="width: 100px;">Temp (°C)</th>
						<th style="width: 100px;">Hum (%)</th>
						<th>Observaciones</th>
					</tr>
				</thead>
				<tbody>
					<tr><td colspan="4" class="section-title">Áreas (Límite sugerido: 25°C)</td></tr>
					<script>
						const areas = ["Almacén MP I", "Área de sótano", "Almacén de calidad", "Almacén de MP II", "Área de Premezcla", "Almacén de PT", "Área de lavado PDT", "Área de empaquetado", "Cuarto de enfriado", "Área de charcuteria", "Área de porcionado", "Prod. fresco PDT", "Área de wash PDT", "Producción PDT", "Recepción de MP", "Área de Batata I", "Área de Batata II", "Área de hojaldre"];
						areas.forEach(a => {
							document.write(`<tr>
								<td><input type="hidden" name="nombre" value="${a}">${a}</td>
								<td><input type="number" name="temp" step="0.1" onchange="validarTemp(this, 25)"></td>
								<td><input type="number" name="hum"></td>
								<td><input type="text" name="obs"></td>
							</tr>`);
						});
					</script>

					<tr><td colspan="4" class="section-title">Cavas Conservación (Máx 5°C)</td></tr>
					<script>
						const conservacion = ["Cava Conservadora 1", "Cava Conservadora 2", "Cava Conservadora 4", "Fermentadora de producción", "Nevera #14 True"];
						conservacion.forEach(e => {
							document.write(`<tr>
								<td><input type="hidden" name="nombre" value="${e}">${e}</td>
								<td><input type="number" name="temp" step="0.1" onchange="validarTemp(this, 5)"></td>
								<td><input type="number" name="hum" value="0" readonly style="background:#eee"></td>
								<td><input type="text" name="obs"></td>
							</tr>`);
						});
					</script>

					<tr><td colspan="4" class="section-title">Cavas Congelación (Máx -10°C)</td></tr>
					<script>
						const congelacion = ["Cava Congelación 1", "Cava Congeladora 4", "Cava congeladora 3", "Ultra congelador (hojaldre)", "Congelador #6 (hojaldre)", "Congelador (hojaldre)"];
						congelacion.forEach(e => {
							document.write(`<tr>
								<td><input type="hidden" name="nombre" value="${e}">${e}</td>
								<td><input type="number" name="temp" step="0.1" onchange="validarTemp(this, -10)"></td>
								<td><input type="number" name="hum" value="0" readonly style="background:#eee"></td>
								<td><input type="text" name="obs"></td>
							</tr>`);
						});
					</script>
				</tbody>
			</table>
			<button type="button" class="btn-save" onclick="enviar()">Guardar Registro</button>
		</form>
	</div>

	<script>
		document.getElementById('fechaMain').valueAsDate = new Date();

		// Función que cambia el color si la temperatura es alta
		function validarTemp(input, limite) {
			const valor = parseFloat(input.value);
			if (valor > limite) {
				input.classList.add('alerta-critica');
			} else {
				input.classList.remove('alerta-critica');
			}
		}

		function enviar() {
			const resp = document.getElementById('responsable').value;
			if (!resp) { alert("Indique el responsable"); return; }
      
			const form = document.getElementById('formRegistro');
			google.script.run.withSuccessHandler(() => {
				alert("¡Guardado!");
				location.reload();
			}).procesarFormulario(form);
		}
	</script>
</body>
	<script>
		if ('serviceWorker' in navigator) {
			window.addEventListener('load', function() {
				navigator.serviceWorker.register('service-worker.js');
			});
		}
	</script>
</html>
