<!DOCTYPE html>
<html lang="es">
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1976d2">
    <title>Registro Técnico Producción</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --bg: #f4f7f6; --danger: #ff7675; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); padding: 10px; margin: 0; }
        .container { max-width: 900px; margin: auto; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); border-bottom: 2px solid var(--primary); font-size: 1.2rem; }
        .header-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; background: #ecf0f1; padding: 10px; border-radius: 5px; }
        label { font-size: 0.9rem; font-weight: bold; display: block; }
        
        /* Ajustes para tabla responsiva */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
        th { background: var(--primary); color: white; padding: 8px 4px; text-align: left; font-size: 0.8rem; }
        td { padding: 6px 4px; border-bottom: 1px solid #eee; font-size: 0.85rem; overflow: hidden; }
        
        /* Anchos fijos para que no desborde en móvil */
        th:nth-child(1), td:nth-child(1) { width: 35%; } 
        th:nth-child(2), td:nth-child(2) { width: 18%; } 
        th:nth-child(3), td:nth-child(3) { width: 15%; } 
        th:nth-child(4), td:nth-child(4) { width: 32%; }

        input { width: 100%; padding: 6px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 0.9rem; }
        .alerta-critica { background-color: var(--danger) !important; color: white; font-weight: bold; }
        .btn-save { background: var(--secondary); color: white; padding: 15px; border: none; border-radius: 5px; width: 100%; margin-top: 20px; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
        .section-title { background: #dfe6e9; padding: 6px; font-weight: bold; color: #636e72; font-size: 11px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Control: Temperaturas y Humedad</h2>
        <form id="formRegistro">
            <div class="header-fields">
                <div><label>Responsable:</label><input type="text" id="responsable" required></div>
                <div><label>Fecha:</label><input type="date" id="fechaMain" required></div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Equipo</th>
                        <th>Temp</th>
                        <th>Hum</th>
                        <th>Obs.</th>
                    </tr>
                </thead>
                <tbody id="tablaBody">
                    </tbody>
            </table>
            <button type="button" class="btn-save" onclick="enviar()">GUARDAR REGISTRO</button>
        </form>
    </div>

    <script>
        // Configuración de equipos por sección
        const secciones = [
            { titulo: "Áreas (Límite: 25°C)", limite: 25, items: ["Almacén MP I", "Área de sótano", "Almacén de calidad", "Almacén de MP II", "Área de Premezcla", "Almacén de PT", "Área de lavado PDT", "Área de empaquetado", "Cuarto de enfriado", "Área de charcuteria", "Área de porcionado", "Prod. fresco PDT", "Área de wash PDT", "Producción PDT", "Recepción de MP", "Área de Batata I", "Área de Batata II", "Área de hojaldre"], hasHum: true },
            { titulo: "Conservación (Máx 5°C)", limite: 5, items: ["Cava Conservadora 1", "Cava Conservadora 2", "Cava Conservadora 4", "Fermentadora de producción", "Nevera #14 True"], hasHum: false },
            { titulo: "Congelación (Máx -10°C)", limite: -10, items: ["Cava Congelación 1", "Cava Congeladora 4", "Cava congeladora 3", "Ultra congelador (hojaldre)", "Congelador #6 (hojaldre)", "Congelador (hojaldre)"], hasHum: false }
        ];

        const tbody = document.getElementById('tablaBody');
        document.getElementById('fechaMain').valueAsDate = new Date();

        // Generación dinámica de la tabla
        secciones.forEach(sec => {
            tbody.innerHTML += `<tr><td colspan="4" class="section-title">${sec.titulo}</td></tr>`;
            sec.items.forEach(nombre => {
                const humField = sec.hasHum ? `<input type="number" name="hum">` : `<input type="number" value="0" readonly style="background:#eee">`;
                tbody.innerHTML += `
                    <tr>
                        <td>${nombre}</td>
                        <td><input type="number" name="temp" step="0.1" onchange="validarTemp(this, ${sec.limite})"></td>
                        <td>${humField}</td>
                        <td><input type="text" name="obs"></td>
                    </tr>`;
            });
        });

        function validarTemp(input, limite) {
            if (parseFloat(input.value) > limite) { input.classList.add('alerta-critica'); } 
            else { input.classList.remove('alerta-critica'); }
        }

        async function enviar() {
            const resp = document.getElementById('responsable').value;
            const fecha = document.getElementById('fechaMain').value;
            
            if (!resp) { alert("Por favor, indique el responsable"); return; }

            const filas = document.querySelectorAll('#tablaBody tr:not(.section-title)');
            const registros = [];

            filas.forEach(fila => {
                const nombre = fila.cells[0].innerText;
                const temp = fila.querySelector('input[name="temp"]').value;
                const hum = fila.querySelector('input[name="hum"]').value;
                const obs = fila.querySelector('input[name="obs"]').value;

                if (temp !== "") {
                    registros.push({ nombre, temp, hum, obs });
                }
            });

            if (registros.length === 0) { alert("No hay datos de temperatura para enviar"); return; }

            const datosParaEnviar = { responsable: resp, fechaMain: fecha, registros: registros };
            const URL_DE_GOOGLE = "https://script.google.com/macros/s/AKfycbz5vZIRBglYSV6UoMgcKoEAe0Mwh262t_0j7e1Lfou_zHSLp4O4zNHAQsujE9apCDMc5w/exec";

            try {
                // El modo 'no-cors' es esencial para que el móvil no bloquee la petición
                await fetch(URL_DE_GOOGLE, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(datosParaEnviar)
                });
                alert("✅ ¡Registro enviado con éxito!");
                location.reload();
            } catch (error) {
                alert("❌ Error de conexión: " + error);
            }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('service-worker.js'); });
        }
    </script>
</body>
</html>
