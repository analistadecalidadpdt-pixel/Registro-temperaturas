<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Temperaturas | Pan de Tata</title>
    <style>
        :root {
            --accent-color: #c0163c; 
            --pink-bg: #fff5f7; 
            --border-light: #fce7eb; 
            --text-gray: #6b7280;
            --text-dark: #374151;
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 40px 20px;
            background-color: #fcfcfc;
            background-image: radial-gradient(#d1d5db 0.8px, transparent 0.8px);
            background-size: 24px 24px;
            color: var(--text-dark);
        }

        /* Contenedor principal: Envuelve logo, título y formularios */
        .main-wrapper {
            background: white;
            max-width: 950px;
            margin: 0 auto;
            border-radius: 20px;
            border: 1px solid #e5e7eb;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            padding: 30px;
        }

        /* Encabezado interno estilo Merma */
        .internal-header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px dashed #e5e7eb;
        }

        .logo-container img {
            height: 60px;
            margin-right: 20px;
        }

        .title-group h2 {
            margin: 0;
            color: var(--accent-color);
            font-size: 1.7rem;
            font-weight: 800;
        }

        .title-group p {
            margin: 2px 0 0;
            color: #71717a;
            font-size: 0.9rem;
        }

        /* Recuadro de Responsable y Fecha con sombreado rosa */
        .info-grid {
            background: var(--pink-bg);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .input-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-gray);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            background: white;
            box-sizing: border-box;
        }

        .section-tag {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 25px 0 15px;
            border-left: 4px solid var(--accent-color);
            padding-left: 10px;
        }

        .section-tag h3 {
            margin: 0;
            text-transform: uppercase;
            font-size: 0.85rem;
            color: #4b5563;
            letter-spacing: 0.5px;
        }

        .table-container {
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        .category-row {
            background: var(--pink-bg);
            color: #64748b;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            text-align: center;
            padding: 10px;
            border-bottom: 1px solid var(--border-light);
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #f1f5f9;
        }

        .item-name {
            font-size: 0.85rem;
            font-weight: 700;
            color: #475569;
            width: 35%;
        }

        .input-table {
            width: 100%;
            padding: 8px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 0.85rem;
            box-sizing: border-box;
        }

        /* Observación pegada al borde derecho */
        .td-obs {
            padding-right: 0 !important;
            width: 35%;
        }

        .input-obs {
            border-right: none;
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
            background-color: #fafafa;
        }

        .btn-submit {
            width: 100%;
            background: var(--accent-color);
            color: white;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            margin-top: 30px;
            text-transform: uppercase;
            box-shadow: 0 4px 12px rgba(192, 22, 60, 0.2);
            transition: 0.2s;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        @media (max-width: 600px) {
            .info-grid { grid-template-columns: 1fr; }
            .main-wrapper { padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <header class="internal-header">
            <div class="logo-container">
                <img src="PDT.png" alt="Logo Pan de Tata">
            </div>
            <div class="title-group">
                <h2>Control de Temperatura</h2>
                <p>Reporte Técnico Diario</p>
            </div>
        </header>

        <div class="info-grid">
            <div class="input-group">
                <label>Responsable</label>
                <input type="text" id="responsable" placeholder="Nombre y Apellido">
            </div>
            <div class="input-group">
                <label>📅 FECHA DE REGISTRO</label>
                <input type="date" id="fechaMain">
            </div>
        </div>

        <div class="section-tag">
            <h3>📋 DETALLES DE REGISTRO POR ÁREAS</h3>
        </div>

        <div class="table-container">
            <table>
                <tbody id="tablaBody">
                    </tbody>
            </table>
        </div>

        <button class="btn-submit" onclick="enviar()">
            🚀 GUARDAR REGISTRO COMPLETO
        </button>
    </div>

<script>
    const secciones = [
        { 
            titulo: "Áreas (Límite: 30°C)", 
            limite: 30, 
            items: ["Almacén MP I", "Área de sótano", "Almacén de calidad", "Almacén de MP II", "Área de Premezcla", "Almacén de PT", "Área de lavado PDT", "Área de empaquetado", "Cuarto de enfriado", "Área de charcuteria", "Área de porcionado", "Prod. fresco PDT", "Área de wash PDT", "Fermentadora de producción", "Producción PDT", "Recepción de MP", "Área de Batata I", "Área de Batata II", "Área de hojaldre"], 
            hasHum: true 
        },
        { 
            titulo: "Refrigeración (Máx 5°C)", 
            limite: 5, 
            items: ["Cava Conservadora 1", "Cava Conservadora 2", "Cava Conservadora 4", "Nevera #14 True"], 
            hasHum: false 
        },
        { 
            titulo: "Congelación (Máx -10°C)", 
            limite: -10, 
            items: ["Cava Congelación 1", "Cava Congeladora 4", "Cava congeladora 3", "Ultra congelador (hojaldre)", "Congelador #6 (hojaldre)", "Congelador (hojaldre)"], 
            hasHum: false 
        }
    ];

    const tbody = document.getElementById('tablaBody');
    document.getElementById('fechaMain').valueAsDate = new Date();

    secciones.forEach(sec => {
        tbody.innerHTML += `<tr><td colspan="4" class="category-row">${sec.titulo}</td></tr>`;
        sec.items.forEach(nombre => {
            const humField = sec.hasHum ? 
                `<input type="number" name="hum" step="0.1" class="input-table" placeholder="Hum %">` : 
                `<input type="number" value="0" readonly style="background:#f1f5f9; border:none; color:#cbd5e1" class="input-table">`;
            
            tbody.innerHTML += `
                <tr>
                    <td class="item-name">${nombre}</td>
                    <td style="width: 12%"><input type="number" name="temp" step="0.1" class="input-table" placeholder="°C" onchange="validarTemp(this, ${sec.limite})"></td>
                    <td style="width: 12%">${humField}</td>
                    <td class="td-obs"><input type="text" name="obs" class="input-table input-obs" placeholder="Observación"></td>
                </tr>`;
        });
    });

    function validarTemp(input, limite) {
        if (parseFloat(input.value) > limite) { 
            input.style.backgroundColor = "#fef2f2";
            input.style.borderColor = "#ef4444";
        } else { 
            input.style.backgroundColor = "white";
            input.style.borderColor = "#e2e8f0";
        }
    }

    async function enviar() {
        const btn = document.querySelector('.btn-submit');
        const resp = document.getElementById('responsable').value;
        const fechaVal = document.getElementById('fechaMain').value;
        
        if (!resp) { alert("Por favor, indique el responsable"); return; }
        btn.innerText = "● CONECTANDO...";

        const registros = [];
        document.querySelectorAll('#tablaBody tr').forEach(fila => {
            const inputTemp = fila.querySelector('input[name="temp"]');
            if (inputTemp && inputTemp.value !== "") { 
                registros.push({
                    nombre: fila.cells[0].innerText.trim(),
                    temp: inputTemp.value,
                    hum: fila.querySelector('input[name="hum"]')?.value || 0,
                    obs: fila.querySelector('input[name="obs"]')?.value || ""
                });
            }
        });

        if (registros.length === 0) { 
            alert("No hay datos para enviar"); 
            btn.innerHTML = "🚀 GUARDAR REGISTRO COMPLETO";
            return; 
        }

        try {
            await fetch("https://script.google.com/macros/s/AKfycbz5vZIRBglYSV6UoMgcKoEAe0Mwh262t_0j7e1Lfou_zHSLp4O4zNHAQsujE9apCDMc5w/exec", 
            { method: 'POST', mode: 'no-cors', body: JSON.stringify({ responsable: resp, fecha: fechaVal, registros: registros }) });
            alert("✅ ¡Registro enviado con éxito!");
            location.reload(); 
        } catch (e) {
            alert("❌ Error de conexión");
            btn.innerHTML = "🚀 GUARDAR REGISTRO COMPLETO";
        }
    }
</script>

</body>
</html>
