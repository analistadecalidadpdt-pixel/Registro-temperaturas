<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación de BPM por Áreas | Pan de Tata</title>
    <style>
        :root {
            --accent-color: #c0163c; /* Guinda Pan de Tata */
            --pink-bg: #fff5f7; 
            --border-light: #fce7eb; 
            --text-gray: #6b7280;
            --text-dark: #374151;
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #fcfcfc;
            background-image: radial-gradient(#d1d5db 0.8px, transparent 0.8px);
            background-size: 24px 24px;
            color: var(--text-dark);
        }

        .main-wrapper {
            background: white;
            max-width: 1400px;
            margin: 0 auto;
            border-radius: 20px;
            border: 1px solid #e5e7eb;
            box-shadow: var(--card-shadow);
            padding: 30px;
            box-sizing: border-box;
        }

        .internal-header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px dashed #e5e7eb;
        }

        .logo-container img {
            height: 60px;
            margin-right: 20px;
        }

        .title-group h2 {
            margin: 0;
            color: var(--accent-color);
            font-size: 1.6rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .title-group p {
            margin: 2px 0 0;
            color: #71717a;
            font-size: 0.9rem;
        }

        .info-grid {
            background: var(--pink-bg);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .input-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-gray);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 11px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            background: white;
            box-sizing: border-box;
            color: var(--text-dark);
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.01);
            margin-bottom: 25px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            /* Reducimos el ancho mínimo total ya que las columnas C/N ocupan la mitad de espacio */
            min-width: 950px; 
        }

        th {
            background: var(--pink-bg);
            color: var(--accent-color);
            font-size: 0.75rem;
            font-weight: 800;
            padding: 14px 6px;
            border-bottom: 2px solid var(--border-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        /* Ajustes de columnas optimizados para móvil */
        th.col-asistencia {
            width: 100px;
            min-width: 100px;
        }

        th.col-nombre, td.col-nombre {
            text-align: center; /* Centrado como solicitaste */
            width: 180px;
            min-width: 180px;
        }

        th.col-crit, td.col-crit {
            width: 50px;
            min-width: 50px;
        }

        th.col-obs, td.col-obs {
            width: 180px;
            min-width: 180px;
            padding-right: 15px;
        }

        td {
            padding: 10px 4px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.85rem;
            vertical-align: middle;
        }

        tr:hover td {
            background-color: #fff9fa;
        }

        /* Estilo limpio para los nombres separados en dos líneas y sin negrita */
        /* Estilo limpio, compacto y en una sola línea para el personal */
.worker-name {
    font-weight: 500; /* Ni muy grueso ni muy delgado, estilo profesional */
    color: #475569;   /* Un tono gris oscuro elegante */
    font-size: 0.85rem; /* Tamaño compacto para que respire la fila */
    text-align: left;
    white-space: nowrap; /* Fuerza a que se mantenga en una sola línea */
    overflow: hidden;
    text-overflow: ellipsis; /* Si el nombre es ultra largo, añade "..." al final en vez de romper la tabla */
    display: block;
    max-width: 220px; /* Límite para proteger el espacio en teléfonos */
}

        /* Selector de asistencia compacto */
        .select-asistencia {
            padding: 4px 2px;
            font-size: 0.75rem;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            background-color: #f3f4f6;
            cursor: pointer;
            font-weight: 600;
        }
        .status-asistente { color: #16a34a; background-color: #f0fdf4; border-color: #bbf7d0; }
        .status-inasistente { color: #dc2626; background-color: #fef2f2; border-color: #fecaca; }

        /* Menú desplegable ultra pequeño y optimizado (C / N / N/A) */
        .select-status {
            width: 44px; /* Tamaño súper reducido */
            padding: 6px 0px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 0.85rem;
            background-color: #ffffff;
            color: #16a34a; /* Por defecto verde Cumple */
            font-weight: 700;
            cursor: pointer;
            box-sizing: border-box;
            text-align: center;
            text-align-last: center; /* Centra la letra dentro del select en Android/iOS */
        }

        /* Colores específicos de selección para las letras compactas */
        .val-c { color: #16a34a; border-color: #bbf7d0; background-color: #f0fdf4; }
        .val-n { color: #dc2626; border-color: #fecaca; background-color: #fef2f2; }
        .val-na { color: #71717a; border-color: #e4e4e7; background-color: #f4f4f5; }

        .input-obs {
            width: 100%;
            padding: 7px 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 0.8rem;
            box-sizing: border-box;
            background-color: #fafafa;
        }

        /* Control visual cuando la fila pasa a Inasistente */
        tr.row-inasistente {
            background-color: #f9fafb;
        }
        tr.row-inasistente td.col-nombre .worker-name,
        tr.row-inasistente td.col-nombre .worker-name span {
            color: #9ca3af !important;
        }
        tr.row-inasistente .select-status {
            background-color: #f4f4f5 !important;
            color: #a1a1aa !important;
            border-color: #e4e4e7 !important;
            pointer-events: none; /* Bloquea clics en el teléfono */
        }

        .btn-submit {
            width: 100%;
            background: var(--accent-color);
            color: white;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 12px rgba(192, 22, 60, 0.2);
            transition: 0.2s;
        }

        .btn-submit:active { transform: scale(0.99); }

        .area-vacia {
            text-align: center;
            padding: 40px;
            color: var(--text-gray);
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <header class="internal-header">
            <div class="logo-container">
                <img src="PDT.png" alt="Logo Pan de Tata">
            </div>
            <div class="title-group">
                <h2>Evaluación de BPM por Áreas</h2>
                <p>Auditoría de Higiene y Personal Planta</p>
            </div>
        </header>

        <div class="info-grid">
            <div class="input-group">
                <label>👤 RESPONSABLE DE EVALUACIÓN</label>
                <input type="text" id="responsableEval" placeholder="Nombre del evaluador...">
            </div>
            <div class="input-group">
                <label>📍 SELECCIONE EL ÁREA</label>
                <select id="selectArea" onchange="filtrarPorArea()">
                <option value="">Cargando áreas desde Sheets...</option>
                </select>
            </div>
            <div class="input-group">
                <label>📅 FECHA</label>
                <input type="date" id="fechaBpm">
            </div>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th class="col-asistencia">Asistencia</th>
                        <th class="col-nombre">Nombre del Trabajador</th>
                        <th class="col-crit">Gorro</th>
                        <th class="col-crit">Uniforme</th>
                        <th class="col-crit">Tapabocas</th>
                        <th class="col-crit">Uñas</th>
                        <th class="col-crit">Rostro</th>
                        <th class="col-crit">Guantes</th>
                        <th class="col-crit">L. Manos</th>
                        <th class="col-crit">Prendas</th>
                        <th class="col-crit">Botas</th>
                        <th class="col-crit">Teléfono</th>
                        <th class="col-obs">Observación</th>
                    </tr>
                </thead>
                <tbody id="tablaBpmBody">
                    <tr>
                        <td colspan="13" class="area-vacia">Cargando base de datos del personal...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <button class="btn-submit" onclick="enviarEvaluacionMasiva()">
            🚀 GUARDAR AUDITORÍA DEL ÁREA
        </button>
    </div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzOQ9aKqRG6XIxnWJv06Q6h3USoOqJMSwS33yz5UqoTWQ6EqiIL6mQK5xoXCdKEwt0tjg/exec";
    const criterios = ["gorro", "uniforme", "tapabocas", "unas", "rostro", "guantes", "lmanos", "prendas", "botas", "telefono"];
    
    let baseTrabajadores = [];

    document.getElementById('fechaBpm').valueAsDate = new Date();

    async function obtenerTrabajadoresDesdeSheets() {
        try {
            const response = await fetch(`${SCRIPT_URL}?action=getTrabajadores`);
            baseTrabajadores = await response.json();
            
            // --- NUEVA LÓGICA DE ACTUALIZACIÓN DINÁMICA ---
            // Extrae las áreas de los trabajadores sin repetir ninguna
            const areasUnicas = [...new Set(baseTrabajadores.map(t => t.area))].sort();
            
            const selectArea = document.getElementById('selectArea');
            selectArea.innerHTML = '<option value="">-- Seleccione un Área --</option>';
            
            areasUnicas.forEach(area => {
                if(area) { // Evita registrar celdas vacías del Sheets
                    selectArea.innerHTML += `<option value="${area}">${area}</option>`;
                }
            });
            // ----------------------------------------------
            
            document.getElementById('tablaBpmBody').innerHTML = `
                <tr>
                    <td colspan="13" class="area-vacia">Seleccione un área en la parte superior para desplegar la lista de personal.</td>
                </tr>`;
        } catch (error) {
            // ... control de errores
        }
    }

    // 2. Renderizado dinámico y optimizado con división de nombres y control de asistencia
   // Modificamos la función para que sea asíncrona (async) y pueda consultar a Google Sheets en tiempo real
async function filtrarPorArea() {
    const areaSeleccionada = document.getElementById('selectArea').value;
    const fechaSeleccionada = document.getElementById('fechaBpm').value;
    const tbody = document.getElementById('tablaBpmBody');
    const btnSubmit = document.querySelector('.btn-submit');
    
    if (!areaSeleccionada) {
        tbody.innerHTML = '<tr><td colspan="13" class="area-vacia">Seleccione un área en la parte superior para desplegar la lista de personal.</td></tr>';
        btnSubmit.disabled = false;
        btnSubmit.innerText = "🚀 GUARDAR AUDITORÍA DEL ÁREA";
        return;
    }

    // --- NUEVA LÓGICA DE VERIFICACIÓN DE DUPLICADOS ---
    tbody.innerHTML = '<tr><td colspan="13" class="area-vacia">🔍 Verificando si ya se realizó una auditoría hoy para esta área...</td></tr>';
    btnSubmit.disabled = true;

    try {
        const checkResponse = await fetch(`${SCRIPT_URL}?action=verificarDuplicado&area=${encodeURIComponent(areaSeleccionada)}&fecha=${fechaSeleccionada}`);
        const checkResult = await checkResponse.json();

        if (checkResult.duplicado) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="13" class="area-vacia" style="color: #dc2626; font-weight: bold; background-color: #fef2f2; padding: 30px; border: 1px dashed #fecaca; border-radius: 8px;">
                        ⚠️ ATENCIÓN: El área "${areaSeleccionada}" YA FUE EVALUADA el día de hoy por: ${checkResult.responsable || "Otro evaluador"}.<br>
                        <span style="font-weight: normal; font-size: 0.85rem; color: #71717a;">No es necesario volver a registrar los datos para evitar duplicados.</span>
                    </td>
                </tr>`;
            btnSubmit.innerText = "❌ ÁREA YA EVALUADA HOY";
            btnSubmit.style.background = "#9ca3af";
            btnSubmit.style.boxShadow = "none";
            return; // Detiene el flujo, no carga los trabajadores para evitar que fuercen el envío
        }
    } catch (error) {
        console.error("Error al verificar duplicados:", error);
        // Si falla la verificación, por seguridad dejamos que continúe pero avisamos en consola
    }

    // Restauramos el estilo original del botón si el área está libre
    btnSubmit.disabled = false;
    btnSubmit.innerText = "🚀 GUARDAR AUDITORÍA DEL ÁREA";
    btnSubmit.style.background = "var(--accent-color)";
    btnSubmit.style.boxShadow = "0 4px 12px rgba(192, 22, 60, 0.2)";

    // --- CONTINÚA TU LÓGICA ORIGINAL DE RENDERIZAR TRABAJADORES ---
    const filtrados = baseTrabajadores.filter(t => t.area === areaSeleccionada);

    if (filtrados.length === 0) {
        tbody.innerHTML = '<tr><td colspan="13" class="area-vacia">No se encontraron trabajadores asignados a esta área en el Sheets.</td></tr>';
        return;
    }

    tbody.innerHTML = "";
    
    filtrados.forEach((trabajador, index) => {
        let filaHTML = `
        <tr class="fila-trabajador" id="fila-bpm-${index}" data-nombre="${trabajador.nombre}">
            <td class="col-asistencia">
                <select class="select-asistencia status-asistente" onchange="controlarAsistenciaFila(${index}, this)">
                    <option value="presente" selected>Asistente</option>
                    <option value="ausente">Inasistente</option>
                </select>
            </td>
            <td class="col-nombre">
                <span class="worker-name"> ${trabajador.nombre.trim()}</span>
            </td>`;

        criterios.forEach(crit => {
            const esProduccionSinGuantes = (areaSeleccionada.toLowerCase().includes('produccion') || areaSeleccionada.toLowerCase().includes('producción')) && crit === 'guantes';
            const claseDinamica = esProduccionSinGuantes ? 'select-status val-na' : 'select-status val-c';

            filaHTML += `
                <td class="col-crit">
                    <select data-crit="${crit}" class="${claseDinamica}" onchange="cambiarColorSelect(this)">
                        <option value="Cumple" ${!esProduccionSinGuantes ? 'selected' : ''}>C</option>
                        <option value="No Cumple">N</option>
                        <option value="N/A" ${esProduccionSinGuantes ? 'selected' : ''}>N/A</option>
                    </select>
                </td>`;
        });

        filaHTML += `
            <td class="col-obs">
                <input type="text" class="input-obs" data-obs="nota" placeholder="Nota de la fila...">
            </td>
        </tr>`;
        
        tbody.innerHTML += filaHTML;
    });
}

    // Maneja los estilos de color compactos según la opción seleccionada
    function cambiarColorSelect(select) {
        select.className = "select-status"; // Resetea clase base
        if (select.value === "No Cumple") {
            select.classList.add("val-n");
        } else if (select.value === "N/A") {
            select.classList.add("val-na");
        } else {
            select.classList.add("val-c");
        }
    }

    // NUEVA FUNCIÓN: Automatiza el bloqueo de la fila y cambia los valores a N/A (o el valor que prefieras) si falta
    function controlarAsistenciaFila(idIndex, selectAsistencia) {
        const fila = document.getElementById('fila-bpm-' + idIndex);
        const selectsCriterios = fila.querySelectorAll('.select-status');

        selectAsistencia.className = 'select-asistencia';
        if (selectAsistencia.value === 'presente') {
            selectAsistencia.classList.add('status-asistente');
            fila.classList.remove('row-inasistente');
            
            // Regresa todos los parámetros a Cumple (C) si se vuelve a marcar como presente
            selectsCriterios.forEach(select => {
                select.value = 'Cumple';
                select.className = 'select-status val-c';
            });
        } else {
            selectAsistencia.classList.add('status-inasistente');
            fila.classList.add('row-inasistente');
            
            // Si está inasistente, cambia automáticamente a "N/A" todos los campos y aplica estilos grises
            selectsCriterios.forEach(select => {
                select.value = 'N/A';
                select.className = 'select-status val-na';
            });
        }
    }

    async function enviarEvaluacionMasiva() {
    const responsable = document.getElementById('responsableEval').value.trim();
    const area = document.getElementById('selectArea').value;
    const fecha = document.getElementById('fechaBpm').value;
    const filas = document.querySelectorAll('.fila-trabajador');
    const btn = document.querySelector('.btn-submit');

    if (!responsable) { alert("Por favor, ingresa el nombre del Responsable de la Evaluación."); return; }
    if (!area) { alert("Por favor, selecciona un área."); return; }
    if (filas.length === 0) { alert("No hay filas de personal cargadas para evaluar."); return; }

    btn.innerText = "● GUARDANDO EN HOJA DE CÁLCULO...";
    btn.disabled = true;

    const registros = Array.from(filas).map(fila => {
        return {
            fecha: fecha,
            area: area,
            asistencia: fila.querySelector('.select-asistencia').value,
            trabajador: fila.getAttribute('data-nombre'),
            gorro: fila.querySelector('[data-crit="gorro"]').value,
            uniforme: fila.querySelector('[data-crit="uniforme"]').value,
            tapabocas: fila.querySelector('[data-crit="tapabocas"]').value,
            unas: fila.querySelector('[data-crit="unas"]').value,
            rostro: fila.querySelector('[data-crit="rostro"]').value,
            guantes: fila.querySelector('[data-crit="guantes"]').value,
            lmanos: fila.querySelector('[data-crit="lmanos"]').value,
            prendas: fila.querySelector('[data-crit="prendas"]').value,
            botas: fila.querySelector('[data-crit="botas"]').value,
            telefono: fila.querySelector('[data-crit="telefono"]').value,
            observaciones: fila.querySelector('[data-obs="nota"]').value,
            responsable: responsable
        };
    });

    // Formateamos los datos como un formulario clásico (el método más compatible con Apps Script)
    const formBody = new URLSearchParams();
    formBody.append('action', 'addAuditoriaMasiva');
    formBody.append('datos', JSON.stringify(registros));

    try {
        // Hacemos la petición esperando una respuesta obligatoria (mode: 'cors')
        const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'cors',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'
            },
            body: formBody
        });
        
        // Verificamos si la respuesta de red fue correcta (Status 200)
        if (!response.ok) {
            throw new Error(`Error de red del servidor (Código ${response.status})`);
        }

        const resultado = await response.json();
        
        if (resultado.status === "SUCCESS") {
            // MENSAJE REAL DE ÉXITO: Confirmado por la base de datos
            alert(`✅ ¡Guardado Confirmado!\nSe registraron exitosamente las evaluaciones de los ${resultado.rows} trabajadores en la hoja 'Auditorias_BPM'.`);
            location.reload();
        } else {
            // MENSAJE REAL DE ERROR devuelto por el propio Google Sheets
            alert("❌ Error en la Base de Datos: " + resultado.message);
            btn.innerText = "🚀 GUARDAR AUDITORÍA DEL ÁREA";
            btn.disabled = false;
        }

    } catch (e) {
        // MENSAJE REAL DE FALLO DE CONEXIÓN (CORS o Red bloqueada)
        console.error("Error detallado:", e);
        alert(`❌ Error Real de Conexión:\nLa información NO pudo ser guardada. El navegador bloqueó el envío o la URL del script es incorrecta.\n\nDetalle: ${e.message}`);
        btn.innerText = "🚀 GUARDAR AUDITORÍA DEL ÁREA";
        btn.disabled = false;
    }
}

    obtenerTrabajadoresDesdeSheets();
</script>
</body>
</html>
