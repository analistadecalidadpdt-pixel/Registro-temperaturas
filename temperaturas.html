<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Temperaturas | Pan de Tata</title>
    <style>
        :root {
            --accent-color: #c0163c; 
            --pink-bg: #fff5f7; 
            --border-light: #fce7eb; 
            --text-gray: #6b7280;
            --text-dark: #374151;
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 40px 20px;
            background-color: #fcfcfc;
            background-image: radial-gradient(#d1d5db 0.8px, transparent 0.8px);
            background-size: 24px 24px;
            color: var(--text-dark);
        }

        .main-wrapper {
            background: white;
            max-width: 950px;
            margin: 0 auto;
            border-radius: 20px;
            border: 1px solid #e5e7eb;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            padding: 30px;
        }

        .internal-header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px dashed #e5e7eb;
        }

        .logo-container img {
            height: 60px;
            margin-right: 20px;
        }

        .title-group h2 {
            margin: 0;
            color: var(--accent-color);
            font-size: 1.7rem;
            font-weight: 800;
        }

        .title-group p {
            margin: 2px 0 0;
            color: #71717a;
            font-size: 0.9rem;
        }

        .info-grid {
            background: var(--pink-bg);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .filter-grid {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.01);
        }

        .input-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-gray);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            background: white;
            box-sizing: border-box;
            height: 44px;
        }

        .section-tag {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 25px 0 15px;
            border-left: 4px solid var(--accent-color);
            padding-left: 10px;
        }

        .section-tag h3 {
            margin: 0;
            text-transform: uppercase;
            font-size: 0.85rem;
            color: #4b5563;
            letter-spacing: 0.5px;
        }

        .status-badge {
            background: #bbf7d0;
            color: #15803d;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 800;
            margin-left: auto;
            display: none;
        }

        .table-container {
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        .category-row {
            background: var(--pink-bg);
            color: #64748b;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            text-align: left;
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-light);
        }

        td {
            padding: 10px 15px;
            border-bottom: 1px solid #f1f5f9;
        }

        .item-name {
            font-size: 0.85rem;
            font-weight: 700;
            color: #475569;
            width: 35%;
        }

        .input-table {
            width: 100%;
            padding: 8px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 0.85rem;
            box-sizing: border-box;
        }

        .td-obs {
            padding-right: 15px !important;
            width: 35%;
        }

        .input-obs {
            border-right: none;
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
            background-color: #fafafa;
        }

        .btn-submit {
            width: 100%;
            background: var(--accent-color);
            color: white;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            margin-top: 30px;
            text-transform: uppercase;
            box-shadow: 0 4px 12px rgba(192, 22, 60, 0.2);
            transition: 0.2s;
        }

        .btn-submit:disabled {
            background: #cbd5e1;
            box-shadow: none;
            cursor: not-allowed;
        }

        .btn-submit:active:not(:disabled) {
            transform: scale(0.98);
        }

        @media (max-width: 768px) {
            .info-grid, .filter-grid { grid-template-columns: 1fr; gap: 15px; }
            .main-wrapper { padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <header class="internal-header">
            <div class="logo-container">
                <img src="PDT.png" alt="Logo Pan de Tata">
            </div>
            <div class="title-group">
                <h2>Control de Temperatura</h2>
                <p>Reporte Técnico Diario</p>
            </div>
        </header>

        <div class="info-grid">
            <div class="input-group">
                <label>Responsable</label>
                <input type="text" id="responsable" placeholder="Nombre y Apellido">
            </div>
            <div class="input-group">
                <label>📅 FECHA DE REGISTRO</label>
                <input type="date" id="fechaMain">
            </div>
        </div>

        <div class="filter-grid">
            <div class="input-group">
                <label>📍 1. Seleccione Ubicación</label>
                <select id="selectUbicacion" onchange="filtrarAreasPorUbicacion()">
                    <option value="">Cargando ubicaciones...</option>
                </select>
            </div>
            <div class="input-group">
                <label>🔍 2. Seleccione Área</label>
                <select id="selectArea" onchange="renderizarElementosArea()" disabled>
                    <option value="">Seleccione primero ubicación...</option>
                </select>
            </div>
        </div>

        <div class="section-tag">
            <h3>📋 DETALLES DE REGISTRO POR ÁREAS</h3>
            <span id="badgeCompletado" class="status-badge">✓ GUARDADO</span>
        </div>

        <div class="table-container">
            <table>
                <tbody id="tablaBody">
                    <tr>
                        <td style="text-align: center; padding: 40px; color: var(--text-gray); font-style: italic;">
                            Sincronizando configuraciones con Google Sheets...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <button class="btn-submit" id="btnGuardar" onclick="enviar()" disabled>
            🚀 GUARDAR SECCIÓN SELECCIONADA
        </button>
    </div>

<script>
    // REEMPLAZA: Pega aquí la URL de ejecución de tu Apps Script implementado
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby_PqHBDuEZk69G-cfAJhqaFwToRUhC6EEFjt0-YLvRNWrJSJ534P1-AK39NcYR2_NBJw/exec";
    
    let estructuraUbicaciones = {}; 
    let seccionesRegistradasHoy = new Set(); 

    document.getElementById('fechaMain').valueAsDate = new Date();

    // 1. Carga inicial: Arma el objeto estructurado
    async function inicializarApp() {
        try {
            const response = await fetch(`${SCRIPT_URL}?action=getCatalogo`);
            const catalogoCrudo = await response.json();
            
            estructuraUbicaciones = {};
            
            catalogoCrudo.forEach(item => {
                const ubi = item.ubicacion; 
                const area = item.titulo;    
                
                if (!estructuraUbicaciones[ubi]) {
                    estructuraUbicaciones[ubi] = {};
                }
                estructuraUbicaciones[ubi][area] = item;
            });

            const selectUbi = document.getElementById('selectUbicacion');
            selectUbi.innerHTML = '<option value="">-- Elige Planta/Nivel --</option>';
            
            Object.keys(estructuraUbicaciones).forEach(ubi => {
                selectUbi.innerHTML += `<option value="${ubi}">${ubi}</option>`;
            });

            document.getElementById('tablaBody').innerHTML = `
                <tr>
                    <td style="text-align: center; padding: 40px; color: var(--text-gray); font-style: italic;">
                        Por favor, elija la ubicación y el área correspondientes arriba para desplegar las celdas.
                    </td>
                </tr>`;
        } catch (error) {
            console.error("Error al inicializar catálogo:", error);
            document.getElementById('tablaBody').innerHTML = `
                <tr>
                    <td style="text-align: center; padding: 40px; color: #ef4444; font-weight: bold;">
                        ⚠️ Error de sincronización. Verifica tu Google Sheets o el código de Apps Script.
                    </td>
                </tr>`;
        }
    }

    // 2. Filtrar áreas según la ubicación seleccionada
    function filtrarAreasPorUbicacion() {
        const ubiSeleccionada = document.getElementById('selectUbicacion').value;
        const selectArea = document.getElementById('selectArea');
        const tbody = document.getElementById('tablaBody');
        const btn = document.getElementById('btnGuardar');
        const badge = document.getElementById('badgeCompletado');

        tbody.innerHTML = `<tr><td style="text-align: center; padding: 40px; color: var(--text-gray); font-style: italic;">Seleccione el área específica en la parte superior.</td></tr>`;
        btn.disabled = true;
        badge.style.display = "none";

        if (ubiSeleccionada === "") {
            selectArea.innerHTML = '<option value="">Seleccione primero ubicación...</option>';
            selectArea.disabled = true;
            return;
        }

        const areasDisponibles = estructuraUbicaciones[ubiSeleccionada];
        
        selectArea.innerHTML = '<option value="">-- Seleccione Área --</option>';
        Object.keys(areasDisponibles).forEach(area => {
            selectArea.innerHTML += `<option value="${area}">${area}</option>`;
        });
        
        selectArea.disabled = false;
    }

    // 3. Renderizar equipos en la tabla
    function renderizarElementosArea() {
        const ubi = document.getElementById('selectUbicacion').value;
        const area = document.getElementById('selectArea').value;
        const tbody = document.getElementById('tablaBody');
        const btn = document.getElementById('btnGuardar');
        const badge = document.getElementById('badgeCompletado');

        if (area === "") {
            tbody.innerHTML = `<tr><td style="text-align: center; padding: 40px; color: var(--text-gray); font-style: italic;">Seleccione el área específica en la parte superior.</td></tr>`;
            btn.disabled = true;
            badge.style.display = "none";
            return;
        }

        const sec = estructuraUbicaciones[ubi][area];
        btn.disabled = false;
        
        const idIdentificadorUnico = `${ubi}-${sec.titulo}`;
        if (seccionesRegistradasHoy.has(idIdentificadorUnico)) {
            badge.style.display = "block";
        } else {
            badge.style.display = "none";
        }

        let html = `<tr><td colspan="4" class="category-row">${ubi} &gt; ${sec.titulo} (Máx: ${sec.limite}°C)</td></tr>`;
        
        sec.items.forEach(nombre => {
            const humField = sec.hasHum ? 
                `<input type="number" name="hum" step="0.1" class="input-table" placeholder="Hum %">` : 
                `<input type="number" value="0" readonly style="background:#f1f5f9; border:none; color:#cbd5e1" class="input-table">`;
            
            html += `
                <tr class="fila-medicion">
                    <td class="item-name">${nombre}</td>
                    <td style="width: 15%"><input type="number" name="temp" step="0.1" class="input-table" placeholder="°C" onchange="validarTemp(this, ${sec.limite})"></td>
                    <td style="width: 15%">${humField}</td>
                    <td class="td-obs"><input type="text" name="obs" class="input-table input-obs" placeholder="Observación"></td>
                </tr>`;
        });

        tbody.innerHTML = html;
    }

    function validarTemp(input, limite) {
        if (input.value !== "" && parseFloat(input.value) > limite) { 
            input.style.backgroundColor = "#fef2f2";
            input.style.borderColor = "#ef4444";
            input.style.color = "#ef4444";
        } else { 
            input.style.backgroundColor = "white";
            input.style.borderColor = "#e2e8f0";
            input.style.color = "inherit";
        }
    }

    // 4. Envío de datos corregido con la nueva estructura
    async function enviar() {
        const btn = document.getElementById('btnGuardar');
        const resp = document.getElementById('responsable').value.trim();
        const fechaVal = document.getElementById('fechaMain').value;
        const ubi = document.getElementById('selectUbicacion').value;
        const area = document.getElementById('selectArea').value;
        
        if (!resp) { alert("Por favor, indique el responsable de la medición."); return; }
        if (ubi === "" || area === "") return;

        const seccionActual = estructuraUbicaciones[ubi][area];
        const registros = [];

        document.querySelectorAll('.fila-medicion').forEach(fila => {
            const inputTemp = fila.querySelector('input[name="temp"]');
            if (inputTemp && inputTemp.value !== "") { 
                registros.push({
                    nombre: fila.querySelector('.item-name').innerText.trim(),
                    temp: inputTemp.value,
                    hum: fila.querySelector('input[name="hum"]')?.value || 0,
                    obs: fila.querySelector('input[name="obs"]')?.value || "",
                    categoria: seccionActual.titulo 
                });
            }
        });

        if (registros.length === 0) { 
            alert("No has ingresado ninguna temperatura para guardar."); 
            return; 
        }

        btn.innerText = "● GUARDANDO SECCIÓN...";
        btn.disabled = true;

        try {
            await fetch(SCRIPT_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({ 
                    responsable: resp, 
                    fecha: fechaVal, 
                    ubicacion: ubi,
                    registros: registros 
                }) 
            });
            
            alert(`✅ ¡Ubicación: ${ubi} | Área: "${seccionActual.titulo}" registrada con éxito!`);
            
            seccionesRegistradasHoy.add(`${ubi}-${seccionActual.titulo}`);
            renderizarElementosArea();
            
            btn.innerHTML = "🚀 GUARDAR SECCIÓN SELECCIONADA";
            btn.disabled = false;
        } catch (e) {
            alert("❌ Error de conexión al intentar guardar");
            btn.innerHTML = "🚀 GUARDAR SECCIÓN SELECCIONADA";
            btn.disabled = false;
        }
    }

    window.onload = inicializarApp;
</script>

</body>
</html>
